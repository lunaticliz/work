document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

6f;margin-bottom:10px;\">💡 {{ q.hint }}<\u002Fdiv>\n          <div style=\"{{ q.slotStyle }}\">{{ q.slotText }}<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:14px;\">\n            <sc-for list=\"{{ q.tokens }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:10px;margin-top:14px;\">\n            <button onclick=\"{{ q.onCheck }}\" style=\"flex:1;border:none;background:#005CE6;color:#fff;font-family:'Baloo 2',cursive;font-weight:800;font-size:16px;padding:11px;border-radius:14px;cursor:pointer;\">こたえあわせ<\u002Fbutton>\n            <button onclick=\"{{ q.onReset }}\" style=\"border:2px solid #e7e0c8;background:#fff;color:#7a7259;font-weight:800;font-size:14px;padding:11px 16px;border-radius:14px;cursor:pointer;\">やりなおす<\u002Fbutton>\n          <\u002Fdiv>\n          <sc-if value=\"{{ q.feedbackShow }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"{{ q.feedbackStyle }}\">{{ q.feedback }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= LET'S TALK ================= -->\n  <section class=\"page page-chat\" style=\"{{ dispChat }}\">\n    <div class=\"no-print\" style=\"position:sticky;top:0;z-index:5;background:rgba(255,252,238,.92);backdrop-filter:blur(6px);border-bottom:2px solid #FCE043;\">\n      <div style=\"max-width:780px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;\">\n        <button onclick=\"{{ goCover }}\" style=\"border:none;background:#fff;border:2px solid #e7e0c8;border-radius:999px;padding:8px 16px;font-weight:800;font-size:14px;color:#3A3A3A;cursor:pointer;\">← もどる<\u002Fbutton>\n        <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;\">💬 英語で話してみよう<\u002Fdiv>\n        <div style=\"font-weight:800;color:#FBB016;\">⭐ {{ talkStars }}/3<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:640px;margin:0 auto;padding:34px 22px 90px;\">\n      <h2 style=\"font-family:'Baloo 2',cursive;font-size:30px;margin:0 0 6px;text-align:center;\">Let's Talk<\u002Fh2>\n      <p style=\"font-weight:700;color:#7a7259;margin:0 0 26px;text-align:center;\">先生と えいごで はなしてみよう！<\u002Fp>\n\n      <sc-for list=\"{{ vmTalk }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <div style=\"margin-bottom:26px;\">\n          <div style=\"display:flex;align-items:flex-start;gap:10px;\">\n            <div style=\"width:42px;height:42px;border-radius:50%;background:#005CE6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;\">🧑‍🏫<\u002Fdiv>\n            <div style=\"background:#fff;border:2px solid #e7e0f5;border-radius:4px 18px 18px 18px;padding:13px 16px;font-weight:700;font-size:16px;color:#244;max-width:80%;\">{{ t.teacher }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFF7D6;border:2px dashed #FCE043;border-radius:16px;padding:14px 16px;margin:14px 0 0 52px;\">\n            <div style=\"font-weight:800;font-size:15px;color:#3A3A3A;\">🗣️ {{ t.ja }}<\u002Fdiv>\n            <div style=\"font-weight:700;font-size:13.5px;color:#9a916f;margin-top:6px;\">{{ t.hint }}<\u002Fdiv>\n            <div style=\"display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;\">\n              <button onclick=\"{{ t.onCheck }}\" style=\"{{ t.checkStyle }}\">{{ t.checkLabel }}<\u002Fbutton>\n              <button onclick=\"{{ t.onToggle }}\" style=\"border:2px solid #e7e0c8;background:#fff;color:#7a7259;font-weight:800;font-size:13.5px;padding:9px 14px;border-radius:12px;cursor:pointer;\">{{ t.toggleLabel }}<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ t.showAnswer }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#F0FAF1;border-radius:12px;padding:11px 14px;margin-top:12px;font-weight:800;color:#1f9d57;font-size:15.5px;\">✅ {{ t.answer }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"text-align:center;margin-top:10px;\">\n        <img src=\"a538aec6-16b3-40d3-846d-da1ab2a51eb4\" alt=\"Toki\" style=\"width:110px;height:auto;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= PROGRESS REPORT (PRINTABLE) ================= -->\n  <section class=\"page page-report\" style=\"{{ dispReport }}\">\n    <div class=\"no-print\" style=\"position:sticky;top:0;z-index:5;background:rgba(255,252,238,.92);backdrop-filter:blur(6px);border-bottom:2px solid #FCE043;\">\n      <div style=\"max-width:820px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;\">\n        <button onclick=\"{{ goCover }}\" style=\"border:none;background:#fff;border:2px solid #e7e0c8;border-radius:999px;padding:8px 16px;font-weight:800;font-size:14px;color:#3A3A3A;cursor:pointer;\">← もどる<\u002Fbutton>\n        <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;\">📋 学習レポート<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;\">\n          <div style=\"display:flex;gap:6px;background:#FBFAF2;padding:4px;border-radius:999px;\">\n            <button onclick=\"{{ setJa }}\" style=\"{{ langJaStyle }}\">日本語<\u002Fbutton>\n            <button onclick=\"{{ setZh }}\" style=\"{{ langZhStyle }}\">中文<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-weight:700;font-size:13px;color:#9a916f;\">Ctrl + P で印刷<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"max-width:820px;margin:0 auto;padding:28px 22px 90px;\">\n\n      <sc-if value=\"{{ isJa }}\" hint-placeholder-val=\"{{ true }}\">\n      <!-- SHEET 1 : Progress Report -->\n      <div class=\"rpt-sheet\" style=\"background:#fff;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,.07);overflow:hidden;margin-bottom:26px;\">\n        <div style=\"background:#FCE043;padding:26px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n          <div>\n            <img src=\"8cc7d51d-6b59-47df-a6d0-fbf90e0ccc42\" alt=\"51Talk\" style=\"height:34px;width:auto;margin-bottom:10px;\">\n            <h2 style=\"font-family:'Baloo 2',cursive;font-size:30px;margin:0;color:#3A3A3A;\">Progress Report<\u002Fh2>\n            <p style=\"margin:4px 0 0;font-weight:800;font-size:15px;color:#3A3A3A;\">生徒名：Tang　／　学年：2年生　／　Level：Primary　／　2026年6月<\u002Fp>\n          <\u002Fdiv>\n          <img src=\"14144506-0b2c-4dbe-8897-9dac8bbaa635\" alt=\"Toki\" style=\"width:92px;height:auto;flex:none;\">\n        <\u002Fdiv>\n\n        <div style=\"padding:30px 34px;\">\n          <!-- highlight -->\n          <div style=\"background:#FFF7D6;border-left:6px solid #FBB016;border-radius:12px;padding:18px 20px;margin-bottom:28px;\">\n            <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:19px;color:#3A3A3A;margin-bottom:8px;\">✨ 今月のハイライト<\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.85;font-weight:600;\">テーブルセッティングをテーマにしたレッスンで、講師が複数の食器を提示した際に <strong style=\"color:#005CE6;\">間を空けずに<\u002Fstrong>「plate」「fork」と英語で答えられる場面が増えました。位置を尋ねられた場面では、<strong style=\"color:#005CE6;\">自分から<\u002Fstrong>「right」「middle」と発話しようとする積極性が印象的でした。<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- skills -->\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <!-- listening -->\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">🎧 Listening<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">Good<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.8;font-weight:600;\">講師の指示や基本的な質問に対し、<strong>迷わず<\u002Fstrong>反応できています。画像を使った語彙確認やドラッグ操作の指示も、聞き返すことなく進められました。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">Next Step<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.8;font-weight:600;\">語尾に付く小さな「s」の音など、<strong>細部の聞き分け<\u002Fstrong>を意識して聞き取る練習に取り組みましょう。<\u002Fp>\n            <\u002Fdiv>\n            <!-- speaking -->\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">🗣️ Speaking<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">Good<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.8;font-weight:600;\">質問に対して単語ではなく<strong>文の形<\u002Fstrong>で答えようとする姿勢が定着し、復唱の際の発話も明瞭です。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">Next Step<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.8;font-weight:600;\">「right」の「r」など、<strong>口の形から<\u002Fstrong>音の出し方を意識し、より正確な発音を目指しましょう。<\u002Fp>\n            <\u002Fdiv>\n            <!-- vocab -->\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">📖 Vocabulary<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">Good<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.8;font-weight:600;\">食器（plate, fork, knife など）や位置を表す言葉（right, left, middle）を、状況に合わせて<strong>正しく選んで<\u002Fstrong>使えています。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">Next Step<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.8;font-weight:600;\">二つ以上のものを指すとき、語尾へ<strong>自然に「s」<\u002Fstrong>を付けられるよう数と一緒に言う練習を重ねましょう。<\u002Fp>\n            <\u002Fdiv>\n            <!-- grammar -->\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">🔤 Grammar<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">Good<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.8;font-weight:600;\">「There is a...」「We need...」といった<strong>基本の言い回し<\u002Fstrong>を、場面に合わせて適切に使えています。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">Next Step<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.8;font-weight:600;\">数を尋ねるときに続く言葉を<strong>常に複数の形<\u002Fstrong>にするなど、形の一致を意識していきましょう。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- overall -->\n          <div style=\"background:#EEF5FF;border-radius:14px;padding:20px;margin-top:24px;\">\n            <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:8px;\">総合所見<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.85;font-weight:600;\">Tang さんの強みは、<strong style=\"color:#005CE6;\">臆せず英語で発話しようとする積極性<\u002Fstrong>と、語彙を正確に選ぶ力です。一方で、<strong style=\"color:#005CE6;\">複数を表す語尾の「s」<\u002Fstrong>や、数を尋ねる際の言葉の形には、まだ意識を向ける余地があります。今後は、<strong style=\"color:#005CE6;\">「いくつ」を表す表現を自然に使いこなせること<\u002Fstrong>を当面のゴールに、聞く・話す両面から定着を図っていきます。<\u002Fp>\n          <\u002Fdiv>\n\n          <!-- plan -->\n          <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:20px;color:#3A3A3A;margin:28px 0 14px;\">🎯 今後の学習プラン<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div style=\"border:2px solid #FCE043;border-radius:14px;padding:18px;background:#FFFDF2;\">\n              <div style=\"font-weight:800;font-size:16px;color:#3A3A3A;margin-bottom:8px;\">①「いくつ？」を英語ですらすら言えるように<\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.85;font-weight:600;\">食事の準備の際に「How many plates do we need?」と問いかけ、「We need four plates.」のように<strong>数と食器をセット<\u002Fstrong>で答える練習をしてみてください。お子さまが「plate」と単数で答えたら「plates だね」とさりげなく語尾を添えると効果的です。数を変えながら3〜4回スムーズに言えればOKです。<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"border:2px solid #FCE043;border-radius:14px;padding:18px;background:#FFFDF2;\">\n              <div style=\"font-weight:800;font-size:16px;color:#3A3A3A;margin-bottom:8px;\">② 位置を表す言葉を会話で使えるように<\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.85;font-weight:600;\">食卓で「Where is the spoon?」と尋ね、「It is on the right side.」「It is in the middle.」のように<strong>位置を答える遊び<\u002Fstrong>を取り入れてみてください。「right」の「r」は口を少しすぼめて発音する点を一緒に確認しましょう。3つの位置の言葉を正しく使い分けられればOKです。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SHEET 2 : Appendix -->\n      <div class=\"rpt-sheet rpt-break\" style=\"background:#fff;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,.07);overflow:hidden;\">\n        <div style=\"background:#005CE6;padding:24px 32px;\">\n          <h2 style=\"font-family:'Baloo 2',cursive;font-size:26px;margin:0;color:#fff;\">Appendix ・ Unit 5：食卓と位置の表現<\u002Fh2>\n          <p style=\"margin:5px 0 0;color:#cfe2ff;font-weight:700;font-size:14px;\">今月学んだ単語と文型のまとめ<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 34px;\">\n          <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:14px;\">📇 単語カード<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:30px;\">\n            <sc-for list=\"{{ wordCards }}\" as=\"w\" hint-placeholder-count=\"9\">\n              <div style=\"border:2px solid #FCE043;border-radius:14px;padding:12px 14px;background:#FFFDF2;\">\n                <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;\">{{ w.en }}<\u002Fdiv>\n                <div style=\"font-weight:800;font-size:14px;color:#3A3A3A;margin-top:2px;\">{{ w.ja }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:14px;\">📐 文型まとめ<\u002Fdiv>\n          <div style=\"border:2px solid #eef0f4;border-radius:14px;overflow:hidden;\">\n            <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.3fr;background:#EEF5FF;font-weight:800;font-size:13.5px;color:#005CE6;\">\n              <div style=\"padding:11px 14px;\">パターン<\u002Fdiv>\n              <div style=\"padding:11px 14px;border-left:1px solid #dde7f5;\">日本語<\u002Fdiv>\n              <div style=\"padding:11px 14px;border-left:1px solid #dde7f5;\">れい文<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ patternRows }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div style=\"{{ r.rowStyle }}\">\n                <div style=\"padding:11px 14px;font-weight:800;font-size:14px;color:#3A3A3A;\">{{ r.pattern }}<\u002Fdiv>\n                <div style=\"padding:11px 14px;border-left:1px solid #eef0f4;font-weight:700;font-size:13.5px;color:#7a7259;\">{{ r.ja }}<\u002Fdiv>\n                <div style=\"padding:11px 14px;border-left:1px solid #eef0f4;font-weight:700;font-size:13.5px;color:#005CE6;\">{{ r.ex }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isZh }}\" hint-placeholder-val=\"{{ false }}\">\n      <!-- SHEET 1 ZH : 学习报告 -->\n      <div class=\"rpt-sheet\" style=\"background:#fff;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,.07);overflow:hidden;margin-bottom:26px;\">\n        <div style=\"background:#FCE043;padding:26px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n          <div>\n            <img src=\"8cc7d51d-6b59-47df-a6d0-fbf90e0ccc42\" alt=\"51Talk\" style=\"height:34px;width:auto;margin-bottom:10px;\">\n            <h2 style=\"font-family:'Baloo 2',cursive;font-size:30px;margin:0;color:#3A3A3A;\">学习报告<\u002Fh2>\n            <p style=\"margin:4px 0 0;font-weight:800;font-size:15px;color:#3A3A3A;\">学生：Tang　／　年级：二年级　／　Level：Primary　／　2026年6月<\u002Fp>\n          <\u002Fdiv>\n          <img src=\"14144506-0b2c-4dbe-8897-9dac8bbaa635\" alt=\"Toki\" style=\"width:92px;height:auto;flex:none;\">\n        <\u002Fdiv>\n\n        <div style=\"padding:30px 34px;\">\n          <div style=\"background:#FFF7D6;border-left:6px solid #FBB016;border-radius:12px;padding:18px 20px;margin-bottom:28px;\">\n            <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:19px;color:#3A3A3A;margin-bottom:8px;\">✨ 本月亮点<\u002Fdiv>\n            <p style=\"margin:0;font-size:15.5px;line-height:1.95;font-weight:600;\">在以\"摆放餐桌\"为主题的课堂上，当老师出示多件餐具时，Tang 同学能够<strong style=\"color:#005CE6;\">不假思索地<\u002Fstrong>用英语说出 \"plate\"\"fork\" 的场面明显增多。被问到物品位置时，她还会<strong style=\"color:#005CE6;\">主动<\u002Fstrong>尝试说出 \"right\"\"middle\"，这份积极性令人印象深刻。<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">🎧 Listening 听力<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">做得好<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.85;font-weight:600;\">对老师的指令和基本提问，能够<strong>毫不犹豫地<\u002Fstrong>作出反应。借助图片确认词汇、以及拖拽操作的指令，都不必反问就顺利完成。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">下一步<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.85;font-weight:600;\">建议有意识地练习听辨<strong>细微的发音区别<\u002Fstrong>，例如词尾那个轻轻的 \"s\" 音。<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">🗣️ Speaking 口语<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">做得好<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.85;font-weight:600;\">回答问题时不再只说单词，而是养成了用<strong>完整句子<\u002Fstrong>作答的习惯，跟读时发音也很清晰。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">下一步<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.85;font-weight:600;\">像 \"right\" 里的 \"r\" 这类音，建议<strong>从口型入手<\u002Fstrong>留意发音方式，争取更准确。<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">📖 Vocabulary 词汇<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">做得好<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.85;font-weight:600;\">能根据情景<strong>正确选用<\u002Fstrong>餐具类（plate、fork、knife 等）和表示位置的词（right、left、middle）。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">下一步<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.85;font-weight:600;\">指两个以上物品时，希望能<strong>自然地加上词尾 \"s\"<\u002Fstrong>，建议把数量和名词放在一起练习。<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"border:2px solid #eef0f4;border-radius:14px;padding:18px;\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:12px;\">🔤 Grammar 语法<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:800;color:#1f9d57;margin-bottom:4px;\">做得好<\u002Fdiv>\n              <p style=\"margin:0 0 12px;font-size:14.5px;line-height:1.85;font-weight:600;\">能在合适的场景里恰当使用 \"There is a...\"\"We need...\" 等<strong>基本表达<\u002Fstrong>。<\u002Fp>\n              <div style=\"font-size:13px;font-weight:800;color:#e07a1a;margin-bottom:4px;\">下一步<\u002Fdiv>\n              <p style=\"margin:0;font-size:14.5px;line-height:1.85;font-weight:600;\">询问数量时，后面的词要<strong>始终用复数形式<\u002Fstrong>，今后请多留意这种形式上的一致。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#EEF5FF;border-radius:14px;padding:20px;margin-top:24px;\">\n            <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:8px;\">综合评语<\u002Fdiv>\n            <p style=\"margin:0;font-size:15px;line-height:1.95;font-weight:600;\">Tang 同学的优势在于<strong style=\"color:#005CE6;\">敢于开口说英语的积极性<\u002Fstrong>，以及准确选词的能力。另一方面，<strong style=\"color:#005CE6;\">表示复数的词尾 \"s\"<\u002Fstrong> 以及询问数量时的词形，还有进一步留意的空间。今后将以<strong style=\"color:#005CE6;\">能够自然运用\"多少\"这类表达<\u002Fstrong>为近期目标，从听与说两方面帮助她稳步巩固。<\u002Fp>\n          <\u002Fdiv>\n\n          <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:20px;color:#3A3A3A;margin:28px 0 14px;\">🎯 今后的学习计划<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div style=\"border:2px solid #FCE043;border-radius:14px;padding:18px;background:#FFFDF2;\">\n              <div style=\"font-weight:800;font-size:16px;color:#3A3A3A;margin-bottom:8px;\">① 让\"多少？\"的英语脱口而出<\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.95;font-weight:600;\">准备饭菜时，可以问 \"How many plates do we need?\"，并像 \"We need four plates.\" 那样把<strong>数量和餐具配成一组<\u002Fstrong>来回答。如果孩子只说单数 \"plate\"，您可以轻轻补一句\"是 plates 哦\"，效果很好。换着不同数字能顺畅地说三四次就算达标。<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"border:2px solid #FCE043;border-radius:14px;padding:18px;background:#FFFDF2;\">\n              <div style=\"font-weight:800;font-size:16px;color:#3A3A3A;margin-bottom:8px;\">② 在对话中用出表示位置的词<\u002Fdiv>\n              <p style=\"margin:0;font-size:14px;line-height:1.95;font-weight:600;\">在餐桌上问 \"Where is the spoon?\"，引导孩子像 \"It is on the right side.\"\"It is in the middle.\" 那样<strong>回答位置<\u002Fstrong>。\"right\" 的 \"r\" 音，请和孩子一起确认要把嘴稍微收圆。能正确区分使用三个位置词就算达标。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SHEET 2 ZH : Appendix -->\n      <div class=\"rpt-sheet rpt-break\" style=\"background:#fff;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,.07);overflow:hidden;\">\n        <div style=\"background:#005CE6;padding:24px 32px;\">\n          <h2 style=\"font-family:'Baloo 2',cursive;font-size:26px;margin:0;color:#fff;\">Appendix ・ Unit 5：餐桌与位置的表达<\u002Fh2>\n          <p style=\"margin:5px 0 0;color:#cfe2ff;font-weight:700;font-size:14px;\">本月所学单词与句型汇总<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 34px;\">\n          <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:14px;\">📇 单词卡<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:30px;\">\n            <sc-for list=\"{{ wordCardsZh }}\" as=\"w\" hint-placeholder-count=\"9\">\n              <div style=\"border:2px solid #FCE043;border-radius:14px;padding:12px 14px;background:#FFFDF2;\">\n                <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;\">{{ w.en }}<\u002Fdiv>\n                <div style=\"font-weight:800;font-size:14px;color:#3A3A3A;margin-top:2px;\">{{ w.zh }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;color:#005CE6;margin-bottom:14px;\">📐 句型汇总<\u002Fdiv>\n          <div style=\"border:2px solid #eef0f4;border-radius:14px;overflow:hidden;\">\n            <div style=\"display:grid;grid-template-columns:1.3fr 1fr 1.3fr;background:#EEF5FF;font-weight:800;font-size:13.5px;color:#005CE6;\">\n              <div style=\"padding:11px 14px;\">句型<\u002Fdiv>\n              <div style=\"padding:11px 14px;border-left:1px solid #dde7f5;\">中文<\u002Fdiv>\n              <div style=\"padding:11px 14px;border-left:1px solid #dde7f5;\">例句<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ patternRowsZh }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div style=\"{{ r.rowStyle }}\">\n                <div style=\"padding:11px 14px;font-weight:800;font-size:14px;color:#3A3A3A;\">{{ r.pattern }}<\u002Fdiv>\n                <div style=\"padding:11px 14px;border-left:1px solid #eef0f4;font-weight:700;font-size:13.5px;color:#7a7259;\">{{ r.zh }}<\u002Fdiv>\n                <div style=\"padding:11px 14px;border-left:1px solid #eef0f4;font-weight:700;font-size:13.5px;color:#005CE6;\">{{ r.ex }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      page: 'cover',\n      wuCurrent: null, wuDone: 0, wuSpin: false,\n      quick: {}, fill: {}, wo: {}, talk: {}, talkShow: {},\n      reportLang: 'ja'\n    };\n    this.vocabAll = [\n      { emoji: '🍽️', en: 'plate', ja: 'おさら' },\n      { emoji: '🔪', en: 'knife', ja: 'ナイフ' },\n      { emoji: '🍴', en: 'fork', ja: 'フォーク' },\n      { emoji: '🥄', en: 'spoon', ja: 'スプーン' },\n      { emoji: '🥢', en: 'chopsticks', ja: 'おはし' },\n      { emoji: '👉', en: 'right', ja: 'みぎ' },\n      { emoji: '👈', en: 'left', ja: 'ひだり' },\n      { emoji: '🎯', en: 'middle', ja: 'まんなか' }\n    ];\n    this.ptQ = [\n      { q: '「How many plates?」は どんな いみ？', options: ['おさらは いくつ？', 'おさらは どこ？', 'おさらは だれの？', 'おさらは なに？'], answer: 0 },\n      { q: '「みぎ」は えいごで なんて いう？', options: ['left', 'up', 'right', 'middle'], answer: 2 },\n      { q: '「フォークが 5つ いる」→ We need ___ forks.', options: ['five', 'plate', 'where', 'middle'], answer: 0 }\n    ];\n    this.fillQ = [\n      { q: 'How ___ plates do we need?', hint: 'いくつ いる？', options: ['many', 'much', 'old', 'are'], answer: 0 },\n      { q: 'We need three ___ .', hint: '3つの フォーク', options: ['fork', 'forks', 'forking', 'forked'], answer: 1 }\n    ];\n    this.woQ = [\n      { tokens: ['We', 'need', 'five', 'knives', '.'], hint: 'ナイフが 5つ いる。' },\n      { tokens: ['It', 'is', 'in', 'the', 'middle', '.'], hint: 'まんなかに あるよ。' },\n      { tokens: ['How', 'many', 'forks', '?'], hint: 'フォークは いくつ？' }\n    ];\n    this.woShuffle = [ [2, 4, 0, 3, 1], [4, 0, 3, 1, 5, 2], [2, 0, 3, 1] ];\n    this.chatTurns = [\n      { teacher: \"Let's set the table! How many plates do we need?\", ja: '「おさらは 4つ いるよ」と いってみよう', hint: '💡 We need + かず + plates', answer: 'We need four plates.' },\n      { teacher: 'Great! Where are the chopsticks?', ja: '「おはしは みぎに あるよ」と いってみよう', hint: '💡 They are on the + ばしょ + side.', answer: 'They are on the right side.' },\n      { teacher: 'Perfect! And where is the spoon?', ja: '「スプーンは まんなかに あるよ」と いってみよう', hint: '💡 It is in the + ばしょ .', answer: 'It is in the middle.' }\n    ];\n    this.wordCards = [\n      { en: 'table', ja: 'テーブル' }, { en: 'plate', ja: 'おさら' }, { en: 'knife', ja: 'ナイフ' },\n      { en: 'fork', ja: 'フォーク' }, { en: 'spoon', ja: 'スプーン' }, { en: 'chopsticks', ja: 'おはし' },\n      { en: 'right', ja: 'みぎ' }, { en: 'left', ja: 'ひだり' }, { en: 'middle', ja: 'まんなか' }\n    ];\n    this.patternRows = [\n      { pattern: 'How many [もの-s] do we need?', ja: 'いくつ いる？', ex: 'How many plates do we need?' },\n      { pattern: 'We need [かず] [もの-s].', ja: '〜が いる', ex: 'We need five forks.' },\n      { pattern: 'Where is [もの]?', ja: '〜は どこ？', ex: 'Where is the spoon?' },\n      { pattern: 'It is on the [right/left] side.', ja: 'みぎ／ひだりに ある', ex: 'It is on the left side.' },\n      { pattern: 'It is in the middle.', ja: 'まんなかに ある', ex: 'It is in the middle.' }\n    ];\n  }\n\n  go(p) { this.setState({ page: p }); window.scrollTo(0, 0); }\n\n  spin() {\n    if (this.state.wuSpin || this.state.wuDone >= 5) return;\n    this.setState({ wuSpin: true });\n    var self = this, ticks = 0;\n    this._iv = setInterval(function () {\n      ticks++;\n      var w = self.vocabAll[Math.floor(Math.random() * self.vocabAll.length)];\n      if (ticks >= 14) { clearInterval(self._iv); self.setState({ wuCurrent: w, wuSpin: false }); }\n      else { self.setState({ wuCurrent: w }); }\n    }, 80);\n  }\n  gotIt() {\n    if (this.state.wuSpin || !this.state.wuCurrent || this.state.wuDone >= 5) return;\n    this.setState({ wuDone: this.state.wuDone + 1, wuCurrent: null });\n  }\n\n  answerQuick(qi, oi) {\n    if (this.state.quick[qi] != null) return;\n    var q = Object.assign({}, this.state.quick); q[qi] = oi;\n    this.setState({ quick: q });\n  }\n  answerFill(qi, oi) {\n    if (this.state.fill[qi] != null) return;\n    var f = Object.assign({}, this.state.fill); f[qi] = oi;\n    this.setState({ fill: f });\n  }\n  pickWO(qi, tIdx) {\n    var cur = this.state.wo[qi] || { picked: [], status: '' };\n    if (cur.status === 'correct') return;\n    if (cur.picked.indexOf(tIdx) !== -1) return;\n    var wo = Object.assign({}, this.state.wo);\n    wo[qi] = { picked: cur.picked.concat([tIdx]), status: '' };\n    this.setState({ wo: wo });\n  }\n  resetWO(qi) {\n    var wo = Object.assign({}, this.state.wo);\n    wo[qi] = { picked: [], status: '' };\n    this.setState({ wo: wo });\n  }\n  checkWO(qi) {\n    var cur = this.state.wo[qi] || { picked: [], status: '' };\n    if (cur.status === 'correct') return;\n    var ok = cur.picked.length === this.woQ[qi].tokens.length;\n    for (var i = 0; i < cur.picked.length && ok; i++) { if (cur.picked[i] !== i) ok = false; }\n    var wo = Object.assign({}, this.state.wo);\n    wo[qi] = { picked: cur.picked, status: ok ? 'correct' : 'wrong' };\n    this.setState({ wo: wo });\n  }\n  checkTalk(ti) {\n    var t = Object.assign({}, this.state.talk); t[ti] = true;\n    this.setState({ talk: t });\n  }\n  toggleTalk(ti) {\n    var s = Object.assign({}, this.state.talkShow); s[ti] = !s[ti];\n    this.setState({ talkShow: s });\n  }\n\n  renderVals() {\n    var self = this, S = this.state;\n    var DISP = function (p) { return { display: S.page === p ? 'block' : 'none' }; };\n\n    // stars\n    var wuStars = S.wuDone;\n    var quickStars = 0; this.ptQ.forEach(function (q, i) { if (S.quick[i] === q.answer) quickStars++; });\n    var fillStars = 0; this.fillQ.forEach(function (q, i) { if (S.fill[i] === q.answer) fillStars++; });\n    var woStars = 0; this.woQ.forEach(function (q, i) { if (S.wo[i] && S.wo[i].status === 'correct') woStars++; });\n    var builderStars = fillStars + woStars;\n    var talkStars = 0; this.chatTurns.forEach(function (t, i) { if (S.talk[i]) talkStars++; });\n    var totalStars = wuStars + quickStars + builderStars + talkStars;\n\n    // nav cards\n    var cardBase = \"background:#fff;border:none;border-radius:22px;padding:22px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.06);border:3px solid #fff;transition:transform .12s,box-shadow .12s;text-align:left;width:100%;display:block;\";\n    var navDefs = [\n      { title: 'Warm-Up Spin', sub: 'たんごルーレット', emoji: '🎯', page: 'warmupPage', s: wuStars, m: 5 },\n      { title: 'Key Points & Quick Check', sub: '今日のポイント', emoji: '📚', page: 'pointsPage', s: quickStars, m: 3 },\n      { title: 'Sentence Builder', sub: '英語クイズにチャレンジ！', emoji: '🧩', page: 'fillPage', s: builderStars, m: 5 },\n      { title: \"Let's Talk\", sub: '英語で話してみよう', emoji: '💬', page: 'chatPage', s: talkStars, m: 3 },\n      { title: 'Progress Report', sub: '学習レポート', emoji: '📋', page: 'reportPage', s: -1, m: 0 }\n    ];\n    var navCards = navDefs.map(function (d) {\n      return {\n        title: d.title, sub: d.sub, emoji: d.emoji,\n        onClick: function () { self.go(d.page); },\n        style: cardBase,\n        starLabel: d.s < 0 ? 'おうちのかたへ' : ('⭐ ' + d.s + ' / ' + d.m)\n      };\n    });\n\n    // warmup\n    var wuCard = S.wuCurrent;\n    var wuDots = [];\n    for (var k = 0; k < 5; k++) {\n      wuDots.push({ style: { fontSize: '30px', color: k < wuStars ? '#FBB016' : '#e7e0c8', animation: k < wuStars ? 'starpop .4s ease' : 'none' } });\n    }\n    var spinBtnBase = { border: 'none', fontFamily: \"'Baloo 2',cursive\", fontWeight: 800, fontSize: '18px', padding: '13px 30px', borderRadius: '16px', cursor: 'pointer' };\n    var spinDisabled = S.wuDone >= 5 || S.wuSpin;\n    var spinBtnStyle = Object.assign({}, spinBtnBase, { background: spinDisabled ? '#e7e0c8' : '#005CE6', color: '#fff', cursor: spinDisabled ? 'not-allowed' : 'pointer' });\n    var gotItActive = !!S.wuCurrent && !S.wuSpin && S.wuDone < 5;\n    var gotItBtnStyle = Object.assign({}, spinBtnBase, { background: gotItActive ? '#FBB016' : '#f0ead4', color: gotItActive ? '#fff' : '#bcb393', cursor: gotItActive ? 'pointer' : 'not-allowed' });\n\n    // quick check VMs\n    var optBase = { fontWeight: 800, fontSize: '15px', padding: '13px 12px', borderRadius: '13px', cursor: 'pointer', border: '2px solid #e7e0c8', background: '#fff', color: '#3A3A3A', textAlign: 'center' };\n    var buildChoice = function (q, qi, chosenMap, answerHandler) {\n      var chosen = chosenMap[qi];\n      var answered = chosen != null;\n      var options = q.options.map(function (label, oi) {\n        var st = Object.assign({}, optBase);\n        if (answered) {\n          st.cursor = 'default';\n          if (oi === q.answer) { st.background = '#E3F7E9'; st.border = '2px solid #1f9d57'; st.color = '#1f9d57'; }\n          else if (oi === chosen) { st.background = '#FDECEC'; st.border = '2px solid #e05a5a'; st.color = '#e05a5a'; }\n          else { st.opacity = .55; }\n        }\n        return { label: label, style: st, onClick: function () { answerHandler.call(self, qi, oi); } };\n      });\n      var correct = chosen === q.answer;\n      return {\n        no: qi + 1, q: q.q, hint: q.hint, options: options,\n        feedbackShow: answered,\n        feedback: correct ? '⭕ せいかい！ ⭐ ゲット！' : ('❌ おしい！ こたえは「' + q.options[q.answer] + '」だよ'),\n        feedbackStyle: { marginTop: '12px', borderRadius: '12px', padding: '10px 14px', fontWeight: 800, fontSize: '14.5px', background: correct ? '#E3F7E9' : '#FDECEC', color: correct ? '#1f9d57' : '#e05a5a' }\n      };\n    };\n    var vmQuick = this.ptQ.map(function (q, qi) { return buildChoice(q, qi, S.quick, self.answerQuick); });\n    var vmFill = this.fillQ.map(function (q, qi) { return buildChoice(q, qi, S.fill, self.answerFill); });\n\n    // word order VMs\n    var tokBase = { fontFamily: \"'Baloo 2',cursive\", fontWeight: 800, fontSize: '16px', padding: '10px 16px', borderRadius: '12px', cursor: 'pointer', border: '2px solid #005CE6', background: '#EEF5FF', color: '#005CE6' };\n    var vmWO = this.woQ.map(function (q, qi) {\n      var cur = S.wo[qi] || { picked: [], status: '' };\n      var tokens = self.woShuffle[qi].map(function (origIdx) {\n        var used = cur.picked.indexOf(origIdx) !== -1;\n        var st = Object.assign({}, tokBase);\n        if (used) { st.opacity = .3; st.cursor = 'default'; }\n        if (cur.status === 'correct') st.cursor = 'default';\n        return { label: q.tokens[origIdx], style: st, onClick: function () { self.pickWO(qi, origIdx); } };\n      });\n      var slotText = cur.picked.length ? cur.picked.map(function (i) { return q.tokens[i]; }).join(' ') : 'ここに ことばが ならぶよ';\n      var slotStyle = {\n        minHeight: '52px', borderRadius: '14px', padding: '14px 16px', fontFamily: \"'Baloo 2',cursive\", fontWeight: 800, fontSize: '20px',\n        background: cur.status === 'correct' ? '#E3F7E9' : (cur.status === 'wrong' ? '#FDECEC' : '#FBFAF2'),\n        border: '2px dashed ' + (cur.status === 'correct' ? '#1f9d57' : (cur.status === 'wrong' ? '#e05a5a' : '#e7e0c8')),\n        color: cur.picked.length ? '#3A3A3A' : '#bcb393'\n      };\n      return {\n        hint: q.hint, tokens: tokens, slotText: slotText, slotStyle: slotStyle,\n        onCheck: function () { self.checkWO(qi); },\n        onReset: function () { self.resetWO(qi); },\n        feedbackShow: cur.status !== '',\n        feedback: cur.status === 'correct' ? '⭕ せいかい！ ⭐ ゲット！' : 'もういちど ならべてみよう！',\n        feedbackStyle: { marginTop: '12px', borderRadius: '12px', padding: '10px 14px', fontWeight: 800, fontSize: '14.5px', background: cur.status === 'correct' ? '#E3F7E9' : '#FDECEC', color: cur.status === 'correct' ? '#1f9d57' : '#e05a5a' }\n      };\n    });\n\n    // talk VMs\n    var vmTalk = this.chatTurns.map(function (t, ti) {\n      var checked = !!S.talk[ti];\n      return {\n        teacher: t.teacher, ja: t.ja, hint: t.hint, answer: t.answer,\n        showAnswer: !!S.talkShow[ti],\n        onCheck: function () { self.checkTalk(ti); },\n        onToggle: function () { self.toggleTalk(ti); },\n        checkLabel: checked ? '⭐ いえたね！' : '👍 いえた！',\n        checkStyle: { border: 'none', background: checked ? '#FBB016' : '#005CE6', color: '#fff', fontFamily: \"'Baloo 2',cursive\", fontWeight: 800, fontSize: '14px', padding: '9px 18px', borderRadius: '12px', cursor: 'pointer' },\n        toggleLabel: S.talkShow[ti] ? 'こたえを かくす' : 'こたえを みる'\n      };\n    });\n\n    // appendix pattern rows zebra\n    var patternRows = this.patternRows.map(function (r, i) {\n      return { pattern: r.pattern, ja: r.ja, ex: r.ex, rowStyle: { display: 'grid', gridTemplate
